# Tainted Grail
#
# Multiple campaigns share chapter numbers, so chapter ids are namespaced internally.
# BG Stats tags can still stay compact:
#   FoA／C1
#   AoL／C1
#   TLK／C1
# or key/value:
#   Campaign: AoL／Chapter: 1

